<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ChatGPT 批量注册 — 管理面板</title>
<meta name="description" content="ChatGPT批量注册管理面板，支持Worker邮箱、多Team邀请、OAuth导出">
<link rel="stylesheet" href="/static/mac_style.css?v=3">
</head>
<body>

<div class="bg"></div>

<!-- ── Header ── -->
<header class="header">
  <div class="header-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a29bfe" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    <h1>ChatGPT 批量注册</h1>
  </div>
  <div class="status-pill" id="statusPill">
    <div class="dot"></div>
    <span id="statusTxt">系统就绪</span>
  </div>
</header>

<!-- ── Page grid ── -->
<div class="page">

  <!-- ══ LEFT SIDEBAR ══ -->
  <aside class="sidebar">

    <!-- 邮箱设置 -->
    <div class="card">
      <div class="card-head" onclick="toggleCard(this)">
        <span class="title">✉️ 邮箱设置</span>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">
        <div class="form-row">
          <label>Worker API Base</label>
          <input id="cfgMailApi" class="inp" placeholder="https://your-worker.xxxxx.workers.dev/api">
        </div>
        <div class="form-row">
          <label>邮箱域名</label>
          <input id="cfgMailDomain" class="inp" placeholder="example.com">
        </div>
        <div class="form-row">
          <label>Admin 密码 / Bearer</label>
          <input id="cfgMailBearer" class="inp" type="password" placeholder="your_admin_password">
        </div>
      </div>
    </div>

    <!-- Team 管理 -->
    <div class="card">
      <div class="card-head" onclick="toggleCard(this)">
        <span class="title">👥 Team 管理 &nbsp;<span id="teamCnt" style="font-size:.75rem;opacity:.6;font-weight:400">0 个</span></span>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">
        <div id="teamList"></div>
        <button class="btn btn-ghost" style="width:100%" onclick="addTeam()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14m-7-7h14"/></svg>
          添加 Team 账户
        </button>
        <p style="font-size:.75rem;color:var(--text-secondary);margin-top:2px">
          每个 Team 可配置 auth_token 和 session_token，用于向注册账号发送邀请。
        </p>
      </div>
    </div>

    <!-- 代理 -->
    <div class="card">
      <div class="card-head" onclick="toggleCard(this)">
        <span class="title">🌐 网络代理</span>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">
        <div class="form-row">
          <label>HTTP / SOCKS5 代理</label>
          <input id="cfgProxy" class="inp" placeholder="http://127.0.0.1:xxxx（留空不用）">
        </div>
      </div>
    </div>

    <!-- OAuth -->
    <div class="card">
      <div class="card-head" onclick="toggleCard(this)">
        <span class="title">🔐 OAuth / Codex</span>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">
        <div class="toggle-wrap">
          <span class="label">启用 OAuth 获取 Token</span>
          <label class="toggle">
            <input type="checkbox" id="cfgOauthEnable" checked>
            <div class="track"></div>
          </label>
        </div>
        <div class="form-row">
          <label>OAuth Issuer</label>
          <input id="cfgOauthIssuer" class="inp" placeholder="https://auth.openai.com">
        </div>
        <div class="form-row">
          <label>OAuth Client ID</label>
          <input id="cfgOauthClient" class="inp" placeholder="app_EMoamEEZ73f0CkXaXp7hrann">
        </div>
      </div>
    </div>

    <!-- SUB2API -->
    <div class="card">
      <div class="card-head" onclick="toggleCard(this)">
        <span class="title">📤 SUB2API 推送</span>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">
        <div class="form-row">
          <label>API URL</label>
          <input id="cfgSub2Url" class="inp" placeholder="https://xxx/api/v1/admin/accounts">
        </div>
        <div class="form-row">
          <label>API Token</label>
          <input id="cfgSub2Token" class="inp" type="password">
        </div>
      </div>
    </div>

    <button class="btn btn-blue" style="width:100%;height:42px;font-size:.95rem" onclick="saveConfig()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      保存所有配置
    </button>

  </aside>

  <!-- ══ MAIN CONTENT ══ -->
  <main class="main">

    <!-- 控制面板 -->
    <div class="card" style="padding:18px 20px">
      <div style="display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap">
        <div class="form-row" style="width:110px">
          <label>注册数量</label>
          <input id="regCount" class="inp" type="number" value="1" min="1">
        </div>
        <div class="form-row" style="width:110px">
          <label>并发线程</label>
          <input id="regWorkers" class="inp" type="number" value="1" min="1">
        </div>
        <div style="flex:1"></div>
        <button class="btn btn-green" id="btnStart" onclick="startTask()" style="height:40px;padding:0 28px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          开始注册
        </button>
        <button class="btn btn-red" id="btnStop" onclick="stopTask()" style="display:none;height:40px;padding:0 28px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12"/></svg>
          停止任务
        </button>
      </div>
    </div>

    <!-- 实时日志 -->
    <div class="card">
      <div class="card-head" style="cursor:default">
        <span class="title">💻 实时日志</span>
        <button class="icon-btn" onclick="clearLog()" title="清空">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
      <!-- 进度条 -->
      <div style="margin:0 0 8px;display:flex;align-items:center;gap:10px">
        <div style="flex:1;height:6px;background:var(--border,#2d2d2d);border-radius:4px;overflow:hidden">
          <div id="progressBar" style="height:100%;width:0%;background:linear-gradient(90deg,#a29bfe,#6c5ce7);border-radius:4px;transition:width .4s ease"></div>
        </div>
        <span id="progressTxt" style="font-size:.72rem;color:var(--text-secondary,#888);white-space:nowrap;min-width:160px;text-align:right">等待任务...</span>
      </div>
      <div class="terminal" id="logArea">
        <div class="log">System initialized. Waiting for task...</div>
      </div>
    </div>

    <!-- 已注册账号库 -->
    <div class="card">
      <div class="card-head" style="cursor:default">
        <span class="title">📊 已注册账号库</span>
        <button class="icon-btn" onclick="loadAccounts()" title="刷新">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
      <div class="toolbar">
        <button class="btn btn-ghost" onclick="exportOAuth('all','all')">📦 导出全部</button>
        <button class="btn btn-ghost" onclick="exportOAuth('selected','all')">📥 导出选中</button>
        <div class="toolbar-spacer"></div>
        <button class="btn btn-ghost-danger" onclick="deleteAccounts('selected')">🗑 删除选中</button>
        <button class="btn btn-red" onclick="deleteAccounts('all')">⚠️ 清空全部</button>
      </div>
      <div class="tbl-wrap" style="margin-top:12px">
        <table>
          <thead>
            <tr>
              <th style="width:36px;text-align:center"><input type="checkbox" class="chk" id="selAll" onchange="toggleAll()"></th>
              <th style="width:50px">#</th>
              <th>邮箱</th>
              <th>密码</th>
              <th>OAuth</th>
            </tr>
          </thead>
          <tbody id="accBody">
            <tr><td colspan="5" class="empty">正在加载...</td></tr>
          </tbody>
        </table>
      </div>
      <div style="height:16px"></div>
    </div>

  </main>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
let sseSource = null;
let accs = [];

// ── Collapse ──
function toggleCard(head) {
  head.classList.toggle('collapsed');
  head.nextElementSibling.classList.toggle('hidden');
}

// ── Toast ──
function toast(msg, type = 'ok') {
  const w = document.getElementById('toasts');
  const d = document.createElement('div');
  d.className = `toast ${type}`;
  d.innerHTML = `<span class="toast-ico">${type === 'ok' ? '✓' : '✕'}</span><span>${msg}</span>`;
  w.appendChild(d);
  setTimeout(() => { d.classList.add('out'); setTimeout(() => d.remove(), 280); }, 3000);
}

// ── Config ──
async function loadConfig() {
  try {
    const cfg = await fetch('/api/config').then(r => r.json());
    v('cfgMailApi', cfg.duckmail_api_base || '');
    v('cfgMailDomain', cfg.duckmail_domain || '');
    v('cfgMailBearer', cfg.duckmail_bearer || '');
    v('cfgProxy', cfg.default_proxy || cfg.proxy || '');
    document.getElementById('cfgOauthEnable').checked = (cfg.enable_oauth !== false);
    v('cfgOauthIssuer', cfg.oauth_issuer || 'https://auth.openai.com');
    v('cfgOauthClient', cfg.oauth_client_id || 'app_EMoamEEZ73f0CkXaXp7hrann');
    v('cfgSub2Url', cfg.sub2api_url || cfg.SUB2API_URL || '');
    v('cfgSub2Token', cfg.sub2api_token || cfg.SUB2API_TOKEN || '');
    // Teams
    document.getElementById('teamList').innerHTML = '';
    (cfg.teams || []).forEach(addTeam);
    refreshTeamCnt();
  } catch (e) { toast('加载配置失败', 'err'); }
}
function v(id, val) { document.getElementById(id).value = val; }

function collectConfig() {
  const teams = [];
  document.querySelectorAll('.team-card').forEach(c => {
    teams.push({
      name: c.querySelector('.t-name').value,
      account_id: c.querySelector('.t-accid').value,
      auth_token: c.querySelector('.t-auth').value,
      session_token: c.querySelector('.t-sess').value,
      max_invites: parseInt(c.querySelector('.t-max').value) || 4,
    });
  });
  return {
    duckmail_api_base: g('cfgMailApi'),
    duckmail_domain: g('cfgMailDomain'),
    duckmail_bearer: g('cfgMailBearer'),
    default_proxy: g('cfgProxy'),
    enable_oauth: document.getElementById('cfgOauthEnable').checked,
    oauth_issuer: g('cfgOauthIssuer'),
    oauth_client_id: g('cfgOauthClient'),
    sub2api_url: g('cfgSub2Url'),
    sub2api_token: g('cfgSub2Token'),
    teams,
  };
}
function g(id) { return document.getElementById(id).value; }

async function saveConfig() {
  const res = await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(collectConfig()) });
  const d = await res.json();
  if (d.ok) toast('配置已保存 ✓'); else toast('保存失败', 'err');
}

// ── Team Management ──
function addTeam(data) {
  const idx = Date.now();
  const d = document.createElement('div');
  d.className = 'team-card';
  d.id = 'tc_' + idx;
  d.innerHTML = `
    <div class="team-card-top">
      <span class="team-lbl">TEAM #${document.querySelectorAll('.team-card').length + 1}</span>
      <button class="icon-btn danger" onclick="document.getElementById('tc_${idx}').remove();refreshTeamCnt()" title="删除">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="form-row">
      <label>Team 名称</label>
      <input class="inp t-name" value="${esc(data?.name||'')}" placeholder="My Team">
    </div>
    <div class="form-row">
      <label>Account / Workspace ID</label>
      <input class="inp t-accid" value="${esc(data?.account_id||'')}" placeholder="d73d36e2-977d-45db-8022-...">
    </div>
    <div class="form-row">
      <label>Auth Token &nbsp;<span style="opacity:.45;font-size:.72rem">（用于发送邀请）</span></label>
      <textarea class="inp t-auth" rows="3" placeholder="eyJhbGciOiJSUzI1NiIs...">${esc(data?.auth_token||'')}</textarea>
    </div>
    <div class="form-row">
      <label>Session Token &nbsp;<span style="opacity:.45;font-size:.72rem">（用于刷新 access token）</span></label>
      <textarea class="inp t-sess" rows="3" placeholder="eyJhbGciOiJkaXIiLCJlbmMi...">${esc(data?.session_token||'')}</textarea>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
      <label style="font-size:.78rem;color:var(--text-secondary)">最大邀请人数</label>
      <input class="inp t-max" type="number" value="${data?.max_invites||4}" min="1" style="width:80px;text-align:center">
    </div>
  `;
  document.getElementById('teamList').appendChild(d);
  refreshTeamCnt();
}
function refreshTeamCnt() {
  const n = document.querySelectorAll('.team-card').length;
  document.getElementById('teamCnt').textContent = n + ' 个';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Accounts ──
async function loadAccounts() {
  accs = await fetch('/api/accounts').then(r => r.json());
  renderAccounts();
}
function renderAccounts() {
  const b = document.getElementById('accBody');
  if (!accs.length) { b.innerHTML = '<tr><td colspan="5" class="empty">暂无注册账号</td></tr>'; return; }
  b.innerHTML = accs.map((a, i) => `
    <tr>
      <td style="text-align:center"><input type="checkbox" class="chk acc-chk" data-idx="${a.index}"></td>
      <td>${i + 1}</td>
      <td style="font-family:var(--mono);font-size:.8rem">${escHTML(a.email)}</td>
      <td style="font-family:var(--mono);font-size:.8rem">••••••••</td>
      <td><span class="tag ${a.oauth_status.includes('ok') ? 'ok' : 'err'}">${escHTML(a.oauth_status || '—')}</span></td>
    </tr>
  `).join('');
}
function escHTML(s) { const d=document.createElement('span'); d.textContent=s; return d.innerHTML; }
function toggleAll() {
  const c = document.getElementById('selAll').checked;
  document.querySelectorAll('.acc-chk').forEach(cb => cb.checked = c);
}
function selectedIdxs() { return [...document.querySelectorAll('.acc-chk:checked')].map(c => +c.dataset.idx); }

async function deleteAccounts(mode) {
  if (mode === 'all' && !confirm('确认清空全部账号记录？')) return;
  const indices = mode === 'selected' ? selectedIdxs() : [];
  if (mode === 'selected' && !indices.length) { toast('请先勾选账号', 'err'); return; }
  const d = await fetch('/api/accounts', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mode, indices }) }).then(r => r.json());
  toast(`已删除 ${d.deleted} 个账号`);
  document.getElementById('selAll').checked = false;
  loadAccounts();
}

async function exportOAuth(mode, type) {
  const indices = mode === 'selected' ? selectedIdxs() : [];
  if (mode === 'selected' && !indices.length) { toast('请先勾选', 'err'); return; }
  toast('正在打包凭据...');
  const res = await fetch('/api/export', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mode, type, indices }) });
  if (!res.ok) { toast('导出失败', 'err'); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(await res.blob());
  a.download = `codex_export_${Date.now()}.zip`;
  a.click();
  toast('ZIP 下载完成');
}

// ── Task ──
function setRunning(r) {
  const pill = document.getElementById('statusPill'), txt = document.getElementById('statusTxt');
  const s = document.getElementById('btnStart'), t = document.getElementById('btnStop');
  if (r) { pill.className = 'status-pill running'; txt.textContent = '注册进行中'; s.style.display = 'none'; t.style.display = ''; }
  else   { pill.className = 'status-pill'; txt.textContent = '系统就绪'; s.style.display = ''; t.style.display = 'none'; loadAccounts(); }
}
async function startTask() {
  await saveConfig();
  const res = await fetch('/api/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ count: +g('regCount') || 1, workers: +g('regWorkers') || 1, proxy: g('cfgProxy') }) });
  const d = await res.json();
  if (d.ok) { clearLog(); setRunning(true); startSSE(); toast('任务已启动'); }
  else toast(d.error || '启动失败', 'err');
}
async function stopTask() { await fetch('/api/stop', { method: 'POST' }); toast('已发送停止信号'); }

function clearLog() { document.getElementById('logArea').innerHTML = ''; }
function appendLog(text) {
  const area = document.getElementById('logArea');
  const div = document.createElement('div');
  div.className = 'log';
  if (text.includes('[OK]') || text.includes('✅') || text.includes('成功')) div.classList.add('ok');
  else if (text.includes('[FAIL]') || text.includes('❌') || text.includes('失败') || text.includes('Traceback')) div.classList.add('err');
  else if (text.includes('⚠️') || text.includes('警告')) div.classList.add('wrn');
  else if (text.includes('[OTP]') || text.includes('[OAuth]') || text.includes('[DEBUG]')) div.classList.add('inf');
  else if (text.startsWith('===') || text.startsWith('###')) div.classList.add('hi');
  div.textContent = text;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function updateProgress(data) {
  const {total, done, success, fail, stopped = 0} = data;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const bar = document.getElementById('progressBar');
  const txt = document.getElementById('progressTxt');
  if (bar) { bar.style.width = pct + '%'; }
  if (txt) { txt.textContent = `${done}/${total}  ✅${success}  ❌${fail}  ⏹️${stopped}  (${pct}%)`; }
}

function startSSE() {
  if (sseSource) sseSource.close();
  sseSource = new EventSource('/api/logs');
  sseSource.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'log')      { appendLog(msg.msg); return; }
      if (msg.type === 'progress') { updateProgress(msg.data); return; }
      if (msg.type === 'done')     {
        if (msg.progress) updateProgress(msg.progress);
        setRunning(false);
        sseSource.close(); sseSource = null;
        toast('全部任务完成 🎉');
        loadAccounts();
        return;
      }
    } catch(_) {
      // 兼容旧纯文本格式
      if (e.data === '__TASK_DONE__') { setRunning(false); sseSource.close(); sseSource = null; toast('全部任务完成 🎉'); return; }
      appendLog(e.data);
    }
  };
}

// ── Init ──
window.addEventListener('DOMContentLoaded', () => {
  loadConfig();
  loadAccounts();
  fetch('/api/status').then(r => r.json()).then(d => { if (d.running) { setRunning(true); startSSE(); } });
});
</script>
</body>
</html>
